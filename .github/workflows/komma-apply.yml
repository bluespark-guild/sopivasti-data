name: komma-apply

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: komma-apply
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Drain apply queue from HQ
        env:
          HQ_BASE_URL: ${{ secrets.HQ_BASE_URL }}
          KOMMA_APPLY_TOKEN: ${{ secrets.KOMMA_APPLY_TOKEN }}
        run: node scripts/komma-apply.mjs
